<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedWork 培训材料</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:"京东朗正体","JDLANGZHENGTI","PingFang SC","Microsoft YaHei",sans-serif;
       background:#04150e;color:#eafff5;overflow:hidden;}
  #deck{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .slide{position:absolute;inset:0;display:none;align-items:center;justify-content:center;}
  .slide.active{display:flex;}
  .slide img{max-width:100vw;max-height:100vh;width:auto;height:auto;object-fit:contain;
             box-shadow:0 1vw 4vw rgba(0,0,0,.35);}
  #prog{position:fixed;left:0;top:0;height:3px;background:linear-gradient(90deg,#14b877,#0a7a4c);width:0;transition:width .25s;z-index:10;}
  .hint{position:fixed;right:2vw;bottom:1.4vh;font-size:1.3vh;color:#7fd7ac;opacity:.7;z-index:10;}
  .pageno{position:fixed;left:2vw;bottom:1.4vh;font-size:1.4vh;color:#7fd7ac;opacity:.85;z-index:10;letter-spacing:.05em;}
</style>
</head>
<body>
<div id="prog"></div>
<div id="deck">
  <section class="slide"><img src="img/slide-01.png" alt="第 1 页"></section>
  <section class="slide"><img src="img/slide-02.png" alt="第 2 页"></section>
  <section class="slide"><img src="img/slide-03.png" alt="第 3 页"></section>
  <section class="slide"><img src="img/slide-04.png" alt="第 4 页"></section>
  <section class="slide"><img src="img/slide-05.png" alt="第 5 页"></section>
  <section class="slide"><img src="img/slide-06.png" alt="第 6 页"></section>
  <section class="slide"><img src="img/slide-07.png" alt="第 7 页"></section>
  <section class="slide"><img src="img/slide-08.png" alt="第 8 页"></section>
  <section class="slide"><img src="img/slide-09.png" alt="第 9 页"></section>
  <section class="slide"><img src="img/slide-10.png" alt="第 10 页"></section>
  <section class="slide"><img src="img/slide-11.png" alt="第 11 页"></section>
  <section class="slide"><img src="img/slide-12.png" alt="第 12 页"></section>
</div>
<div class="pageno"><span id="pn">01</span> / 12</div>
<div class="hint">← → / 空格 翻页　·　F 全屏</div>
<script>
  const slides=[...document.querySelectorAll('.slide')];
  let i=0;
  function show(n){
    i=Math.max(0,Math.min(slides.length-1,n));
    slides.forEach((s,k)=>s.classList.toggle('active',k===i));
    document.getElementById('prog').style.width=((i+1)/slides.length*100)+'%';
    document.getElementById('pn').textContent=String(i+1).padStart(2,'0');
  }
  function next(){show(i+1);} function prev(){show(i-1);}
  document.addEventListener('keydown',e=>{
    if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();next();}
    else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev();}
    else if(e.key==='Home')show(0);
    else if(e.key==='End')show(slides.length-1);
    else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  });
  document.addEventListener('click',e=>{if(e.clientX<window.innerWidth*0.25)prev();else next();});
  show(0);
</script>
</body>
</html>
